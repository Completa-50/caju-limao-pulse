<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard — Boteco Caju Limao</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #F7F5F0;
    --surface: #FFFFFF;
    --border: #E8E4DC;
    --text: #1A1814;
    --muted: #8A8680;
    --green: #2D6A4F;
    --green-bg: #D8F3DC;
    --amber: #7D5A00;
    --amber-bg: #FFF3CD;
    --red: #7B1D1D;
    --red-bg: #FDECEA;
    --accent: #C5703A;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  .topbar { background: var(--text); color: #fff; padding: 16px 32px; display: flex; justify-content: space-between; align-items: center; }
  .topbar-left { display: flex; flex-direction: column; gap: 2px; }
  .topbar-brand { font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; color: rgba(255,255,255,0.5); font-family: 'DM Mono', monospace; }
  .topbar-title { font-size: 16px; font-weight: 600; }
  .topbar-right { display: flex; align-items: center; gap: 12px; }
  .update-time { font-size: 11px; color: rgba(255,255,255,0.4); font-family: 'DM Mono', monospace; }
  .btn-refresh { background: var(--accent); color: #fff; border: none; padding: 8px 16px; border-radius: 6px; font-size: 12px; font-weight: 500; cursor: pointer; font-family: 'DM Sans', sans-serif; transition: opacity 0.15s; }
  .btn-refresh:hover { opacity: 0.85; }
  .btn-refresh:disabled { opacity: 0.4; cursor: not-allowed; }

  .container { max-width: 1100px; margin: 0 auto; padding: 24px 20px; }

  .loading { text-align: center; padding: 80px 20px; color: var(--muted); }
  .loading-spinner { width: 32px; height: 32px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 16px; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .error-box { background: var(--red-bg); border: 1px solid #f5c6c6; border-radius: 10px; padding: 20px; color: var(--red); margin: 20px 0; font-size: 14px; }

  .metrics-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 12px; margin-bottom: 20px; }
  .metric-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 16px; }
  .metric-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 8px; font-family: 'DM Mono', monospace; }
  .metric-val { font-size: 28px; font-weight: 600; line-height: 1; margin-bottom: 4px; }
  .metric-sub { font-size: 12px; color: var(--muted); }

  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px; }
  @media (max-width: 700px) { .grid-2 { grid-template-columns: 1fr; } }

  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 20px; margin-bottom: 16px; }
  .card-title { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); margin-bottom: 16px; font-family: 'DM Mono', monospace; }

  .dim-row { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
  .dim-row:last-child { margin-bottom: 0; }
  .dim-name { font-size: 13px; color: var(--text); width: 140px; flex-shrink: 0; }
  .dim-bar-wrap { flex: 1; height: 6px; background: var(--bg); border-radius: 3px; overflow: hidden; }
  .dim-bar { height: 100%; border-radius: 3px; transition: width 0.6s ease; }
  .dim-score { font-size: 13px; font-weight: 500; width: 32px; text-align: right; font-family: 'DM Mono', monospace; }
  .dim-badge { font-size: 10px; font-weight: 600; padding: 2px 8px; border-radius: 20px; width: 70px; text-align: center; flex-shrink: 0; }
  .badge-bom { background: var(--green-bg); color: var(--green); }
  .badge-atencao { background: var(--amber-bg); color: var(--amber); }
  .badge-critico { background: var(--red-bg); color: var(--red); }
  .badge-nd { background: var(--border); color: var(--muted); }

  .alert-item { border-radius: 8px; padding: 10px 14px; margin-bottom: 8px; font-size: 13px; display: flex; align-items: center; gap: 10px; }
  .alert-item:last-child { margin-bottom: 0; }
  .alert-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .alert-critico { background: var(--red-bg); color: var(--red); }
  .alert-critico .alert-dot { background: var(--red); }
  .alert-atencao { background: var(--amber-bg); color: var(--amber); }
  .alert-atencao .alert-dot { background: var(--amber); }
  .alert-ok { background: var(--green-bg); color: var(--green); }
  .alert-ok .alert-dot { background: var(--green); }

  .comp-row { display: flex; align-items: center; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid var(--border); }
  .comp-row:last-child { border-bottom: none; }
  .comp-label { font-size: 13px; color: var(--muted); }
  .comp-vals { display: flex; gap: 24px; align-items: center; }
  .comp-val { font-size: 20px; font-weight: 600; font-family: 'DM Mono', monospace; }
  .comp-val.seg { color: #1e40af; }
  .comp-val.sex { color: #9a3412; }
  .comp-delta { font-size: 12px; font-weight: 600; padding: 2px 8px; border-radius: 20px; }
  .delta-pos { background: var(--green-bg); color: var(--green); }
  .delta-neg { background: var(--red-bg); color: var(--red); }
  .delta-neu { background: var(--border); color: var(--muted); }

  .comment-item { border-left: 3px solid var(--border); padding: 8px 12px; margin-bottom: 8px; font-size: 13px; color: var(--text); line-height: 1.55; }
  .comment-item:last-child { margin-bottom: 0; }
  .comment-tag { font-size: 10px; font-weight: 600; font-family: 'DM Mono', monospace; color: var(--muted); margin-bottom: 4px; }
  .comment-item.seg-c { border-color: #93C5FD; }
  .comment-item.sex-c { border-color: #FCA5A5; }

  .tendencia-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid var(--border); font-size: 13px; }
  .tendencia-row:last-child { border-bottom: none; }
  .tend-up { color: var(--green); font-weight: 500; }
  .tend-down { color: var(--red); font-weight: 500; }
  .tend-neu { color: var(--muted); }

  .empty-state { text-align: center; padding: 24px; color: var(--muted); font-size: 13px; }

  .section-gap { margin-bottom: 16px; }
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-left">
    <div class="topbar-brand">Boteco Caju Limao</div>
    <div class="topbar-title">Dashboard — Pesquisa Pulso</div>
  </div>
  <div class="topbar-right">
    <div class="update-time" id="update-time">—</div>
    <button class="btn-refresh" onclick="carregar()" id="btn-refresh">Atualizar</button>
  </div>
</div>

<div class="container">
  <div class="loading" id="loading">
    <div class="loading-spinner"></div>
    <div>Buscando dados da planilha...</div>
  </div>
  <div id="dashboard" style="display:none"></div>
</div>

<script>
const SHEET_ID = '1RJxUPC_bPwy6HogjoEzBi6YntZBChClz9hirctY6U_M';
const API_KEY  = ''; // deixar vazio — usa acesso publico via CSV

async function fetchSheet(gid) {
  const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&gid=${gid}`;
  const res = await fetch(url);
  if (!res.ok) throw new Error('Erro ao buscar planilha');
  const text = await res.text();
  return parseCSV(text);
}

function parseCSV(text) {
  const lines = text.trim().split('\n');
  const headers = lines[0].split(',').map(h => h.replace(/^"|"$/g, '').trim());
  return lines.slice(1).map(line => {
    const vals = line.match(/(".*?"|[^,]+|(?<=,)(?=,)|^(?=,)|(?<=,)$)/g) || [];
    const obj = {};
    headers.forEach((h, i) => {
      obj[h] = (vals[i] || '').replace(/^"|"$/g, '').trim();
    });
    return obj;
  });
}

function num(v) { const n = parseFloat(v); return isNaN(n) ? null : n; }
function media(arr) { const v = arr.filter(x => x !== null); return v.length ? v.reduce((a,b)=>a+b,0)/v.length : null; }
function mediaUlt(arr, n) { return media(arr.slice(-n)); }

function semaforo(m) {
  if (m === null) return { label: 'S/D', cls: 'badge-nd', barColor: '#ccc' };
  if (m >= 3.8) return { label: 'BOM', cls: 'badge-bom', barColor: '#2D6A4F' };
  if (m >= 2.8) return { label: 'ATENÇÃO', cls: 'badge-atencao', barColor: '#D97706' };
  return { label: 'CRÍTICO', cls: 'badge-critico', barColor: '#DC2626' };
}

function deltaHtml(a, b) {
  if (a === null || b === null) return '';
  const d = b - a;
  const cls = d > 0.2 ? 'delta-pos' : d < -0.2 ? 'delta-neg' : 'delta-neu';
  const sinal = d > 0 ? '+' : '';
  return `<span class="comp-delta ${cls}">${sinal}${d.toFixed(1)}</span>`;
}

async function carregar() {
  document.getElementById('loading').style.display = 'block';
  document.getElementById('dashboard').style.display = 'none';
  document.getElementById('btn-refresh').disabled = true;

  try {
    // Busca as duas abas — GIDs padrão para primeira e segunda aba
    // Tenta as abas pelo nome via exportação
    let dadosSeg = [], dadosSex = [];

    try {
      // Aba 1 = gid 0 (geralmente segunda-feira se criada primeiro)
      const raw0 = await fetchSheet(0);
      const raw1 = await fetchSheet(1206353071);

      // Detecta qual aba é qual pelo header
      if (raw0.length && raw0[0]['Chegada (1-5)'] !== undefined) {
        dadosSeg = raw0; dadosSex = raw1;
      } else if (raw0.length && raw0[0]['Comida (1-5)'] !== undefined) {
        dadosSex = raw0; dadosSeg = raw1;
      } else {
        dadosSeg = raw0; dadosSex = raw1;
      }
    } catch(e) {
      // Tenta gids alternativos
      dadosSeg = await fetchSheet(0);
      dadosSex = await fetchSheet(1);
    }

    renderDashboard(dadosSeg, dadosSex);
  } catch(e) {
    document.getElementById('loading').innerHTML = `<div class="error-box">Erro ao carregar dados: ${e.message}<br><br>Verifique se a planilha está compartilhada como "Qualquer pessoa com o link pode ver".</div>`;
  }

  document.getElementById('btn-refresh').disabled = false;
  document.getElementById('update-time').textContent = 'Atualizado ' + new Date().toLocaleTimeString('pt-BR', {hour:'2-digit',minute:'2-digit'});
}

function renderDashboard(seg, sex) {
  // Extrai valores numéricos
  const chegada    = seg.map(r => num(r['Chegada (1-5)'])).filter(v=>v!==null);
  const disposicao = seg.map(r => num(r['Disposicao (1-5)'])).filter(v=>v!==null);
  const engajamento= seg.map(r => num(r['Engajamento (1-5)'])).filter(v=>v!==null);
  const comida     = sex.map(r => num(r['Comida (1-5)'])).filter(v=>v!==null);
  const lideranca  = sex.map(r => num(r['Lideranca (1-5)'])).filter(v=>v!==null);
  const empresa    = sex.map(r => num(r['Empresa (1-5)'])).filter(v=>v!==null);

  const totalRespostas = seg.length + sex.length;
  const comComentario  = [...seg, ...sex].filter(r => r['Comentario'] && r['Comentario'].trim()).length;

  const medSeg = media([media(chegada), media(disposicao), media(engajamento)]);
  const medSex = media([media(comida), media(lideranca), media(empresa)]);
  const medGeral = media([medSeg, medSex]);

  const dimensoes = [
    { nome: 'Chegada',     tipo: 'seg', vals: chegada },
    { nome: 'Disposição',  tipo: 'seg', vals: disposicao },
    { nome: 'Engajamento', tipo: 'seg', vals: engajamento },
    { nome: 'Comida',      tipo: 'sex', vals: comida },
    { nome: 'Liderança',   tipo: 'sex', vals: lideranca },
    { nome: 'Empresa',     tipo: 'sex', vals: empresa },
  ];

  // Alertas
  const alertas = dimensoes.map(d => {
    const m = mediaUlt(d.vals, 5);
    const s = semaforo(m);
    return { ...d, media: m, sem: s };
  }).filter(d => d.media !== null && d.media < 3.2);

  // Comentários recentes
  const comentsSeg = seg.filter(r => r['Comentario'] && r['Comentario'].trim()).slice(-8).map(r => ({ tipo: 'seg', texto: r['Comentario'] }));
  const comentsSex = sex.filter(r => r['Comentario'] && r['Comentario'].trim()).slice(-8).map(r => ({ tipo: 'sex', texto: r['Comentario'] }));
  const comentarios = [...comentsSeg, ...comentsSex];

  // Tendência — compara últimas 5 vs anteriores 5
  function tendencia(vals) {
    if (vals.length < 5) return null;
    const rec = media(vals.slice(-5));
    const ant = media(vals.slice(-10, -5));
    if (ant === null) return null;
    return rec - ant;
  }

  document.getElementById('loading').style.display = 'none';
  const dash = document.getElementById('dashboard');
  dash.style.display = 'block';

  dash.innerHTML = `
    <!-- MÉTRICAS RESUMO -->
    <div class="metrics-grid section-gap">
      <div class="metric-card">
        <div class="metric-label">Total respostas</div>
        <div class="metric-val">${totalRespostas}</div>
        <div class="metric-sub">${seg.length} seg · ${sex.length} sex</div>
      </div>
      <div class="metric-card">
        <div class="metric-label">Média geral</div>
        <div class="metric-val" style="color:${medGeral!==null?(medGeral>=3.8?'var(--green)':medGeral>=2.8?'var(--amber)':'var(--red)'):'var(--muted)'}">${medGeral!==null?medGeral.toFixed(1):'—'}</div>
        <div class="metric-sub">escala de 1 a 5</div>
      </div>
      <div class="metric-card">
        <div class="metric-label">Entrada (seg)</div>
        <div class="metric-val" style="color:#1e40af">${medSeg!==null?medSeg.toFixed(1):'—'}</div>
        <div class="metric-sub">chegada · disposição · engaj.</div>
      </div>
      <div class="metric-card">
        <div class="metric-label">Fechamento (sex)</div>
        <div class="metric-val" style="color:#9a3412">${medSex!==null?medSex.toFixed(1):'—'}</div>
        <div class="metric-sub">comida · liderança · empresa</div>
      </div>
      <div class="metric-card">
        <div class="metric-label">Com comentário</div>
        <div class="metric-val">${comComentario}</div>
        <div class="metric-sub">${totalRespostas>0?Math.round(comComentario/totalRespostas*100):0}% das respostas</div>
      </div>
      <div class="metric-card">
        <div class="metric-label">Alertas ativos</div>
        <div class="metric-val" style="color:${alertas.length>0?'var(--red)':'var(--green)'}">${alertas.length}</div>
        <div class="metric-sub">${alertas.length===0?'tudo dentro do esperado':'requer atenção'}</div>
      </div>
    </div>

    <!-- ALERTAS + COMPARATIVO -->
    <div class="grid-2">
      <div class="card">
        <div class="card-title">Alertas ativos</div>
        ${alertas.length === 0
          ? `<div class="alert-item alert-ok"><div class="alert-dot"></div>Todas as dimensões dentro do esperado.</div>`
          : alertas.map(a => `
            <div class="alert-item ${a.media<2.5?'alert-critico':'alert-atencao'}">
              <div class="alert-dot"></div>
              <div><strong>${a.nome}</strong> — média ${a.media.toFixed(1)}/5 · ${a.sem.label}</div>
            </div>`).join('')
        }
      </div>

      <div class="card">
        <div class="card-title">Segunda vs Sexta</div>
        <div class="comp-row">
          <div class="comp-label">Entrada da semana</div>
          <div class="comp-vals">
            <div class="comp-val seg">${medSeg!==null?medSeg.toFixed(1):'—'}</div>
            <div class="comp-val sex">${medSex!==null?medSex.toFixed(1):'—'}</div>
            ${deltaHtml(medSeg, medSex)}
          </div>
        </div>
        ${[
          { label: 'Chegada → Comida',      a: media(chegada),    b: media(comida) },
          { label: 'Disposição → Liderança', a: media(disposicao), b: media(lideranca) },
          { label: 'Engajamento → Empresa',  a: media(engajamento),b: media(empresa) },
        ].map(r => `
          <div class="comp-row">
            <div class="comp-label">${r.label}</div>
            <div class="comp-vals">
              <div class="comp-val seg" style="font-size:15px">${r.a!==null?r.a.toFixed(1):'—'}</div>
              <div class="comp-val sex" style="font-size:15px">${r.b!==null?r.b.toFixed(1):'—'}</div>
              ${deltaHtml(r.a, r.b)}
            </div>
          </div>`).join('')}
        <div style="margin-top:12px;font-size:12px;color:var(--muted)">
          <span style="color:#1e40af;font-weight:600">Azul</span> = segunda &nbsp;·&nbsp; <span style="color:#9a3412;font-weight:600">Laranja</span> = sexta
        </div>
      </div>
    </div>

    <!-- STATUS POR DIMENSÃO -->
    <div class="card section-gap">
      <div class="card-title">Status por dimensão — últimas 5 respostas</div>
      ${dimensoes.map(d => {
        const m = mediaUlt(d.vals, 5);
        const s = semaforo(m);
        const pct = m !== null ? Math.round((m/5)*100) : 0;
        const tend = tendencia(d.vals);
        const tendTxt = tend === null ? '' : tend > 0.3 ? ' ↑' : tend < -0.3 ? ' ↓' : ' →';
        const tendCls = tend === null ? '' : tend > 0.3 ? 'tend-up' : tend < -0.3 ? 'tend-down' : 'tend-neu';
        return `
          <div class="dim-row">
            <div class="dim-name">${d.nome} <span style="font-size:10px;color:var(--muted)">(${d.tipo})</span></div>
            <div class="dim-bar-wrap"><div class="dim-bar" style="width:${pct}%;background:${s.barColor}"></div></div>
            <div class="dim-score">${m!==null?m.toFixed(1):'—'}</div>
            <div class="dim-badge ${s.cls}">${s.label}</div>
            <div class="${tendCls}" style="font-size:12px;width:20px;text-align:center">${tendTxt}</div>
          </div>`;
      }).join('')}
    </div>

    <!-- TENDÊNCIA + COMENTÁRIOS -->
    <div class="grid-2">
      <div class="card">
        <div class="card-title">Tendência — ult. 5 vs anteriores</div>
        ${dimensoes.map(d => {
          const tend = tendencia(d.vals);
          if (tend === null) return `<div class="tendencia-row"><span>${d.nome}</span><span class="tend-neu">Dados insuficientes</span></div>`;
          const cls = tend > 0.3 ? 'tend-up' : tend < -0.3 ? 'tend-down' : 'tend-neu';
          const txt = tend > 0.3 ? '↑ Melhorando' : tend < -0.3 ? '↓ Piorando' : '→ Estável';
          return `<div class="tendencia-row"><span>${d.nome}</span><span class="${cls}">${txt} (${tend>0?'+':''}${tend.toFixed(1)})</span></div>`;
        }).join('')}
      </div>

      <div class="card">
        <div class="card-title">Comentários recentes do time</div>
        ${comentarios.length === 0
          ? `<div class="empty-state">Nenhum comentário registrado ainda.</div>`
          : comentarios.slice(-10).reverse().map(c => `
            <div class="comment-item ${c.tipo}-c">
              <div class="comment-tag">${c.tipo === 'seg' ? 'SEGUNDA' : 'SEXTA'}</div>
              ${c.texto}
            </div>`).join('')
        }
      </div>
    </div>
  `;
}

carregar();
</script>
</body>
</html>
