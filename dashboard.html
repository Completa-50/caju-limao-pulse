<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard — Boteco Caju Limao</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root{--bg:#F7F5F0;--surface:#fff;--border:#E8E4DC;--text:#1A1814;--muted:#8A8680;--green:#2D6A4F;--green-bg:#D8F3DC;--amber:#7D5A00;--amber-bg:#FFF3CD;--red:#7B1D1D;--red-bg:#FDECEA;--accent:#C5703A}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
  .topbar{background:var(--text);color:#fff;padding:14px 28px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px}
  .topbar-brand{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:rgba(255,255,255,.4);font-family:'DM Mono',monospace}
  .topbar-title{font-size:15px;font-weight:600;margin-top:2px}
  .topbar-right{display:flex;align-items:center;gap:10px}
  .update-time{font-size:11px;color:rgba(255,255,255,.3);font-family:'DM Mono',monospace}
  .btn-refresh{background:var(--accent);color:#fff;border:none;padding:8px 16px;border-radius:6px;font-size:12px;font-weight:500;cursor:pointer}
  .btn-refresh:hover{opacity:.85}
  .btn-refresh:disabled{opacity:.4;cursor:not-allowed}
  .filtro-bar{background:var(--surface);border-bottom:1px solid var(--border);padding:12px 28px;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
  .filtro-label{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;font-family:'DM Mono',monospace;white-space:nowrap}
  .pbtn{padding:5px 14px;font-size:12px;font-weight:500;border:1px solid var(--border);border-radius:20px;background:transparent;color:var(--muted);cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .15s}
  .pbtn:hover{border-color:var(--text);color:var(--text)}
  .pbtn.active{background:var(--text);color:#fff;border-color:var(--text)}
  .filtro-custom{display:flex;align-items:center;gap:6px}
  .filtro-custom input[type=date]{padding:4px 8px;font-size:12px;border:1px solid var(--border);border-radius:6px;font-family:'DM Sans',sans-serif;color:var(--text);background:var(--bg)}
  .filtro-info{font-size:11px;color:var(--muted);font-family:'DM Mono',monospace}
  .container{max-width:1100px;margin:0 auto;padding:20px}
  .loading{text-align:center;padding:80px 20px;color:var(--muted)}
  .loading-spinner{width:32px;height:32px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 16px}
  @keyframes spin{to{transform:rotate(360deg)}}
  .error-box{background:var(--red-bg);border:1px solid #f5c6c6;border-radius:10px;padding:20px;color:var(--red);margin:20px 0;font-size:14px;text-align:center}
  .metrics-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(155px,1fr));gap:10px;margin-bottom:14px}
  .metric-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px 16px}
  .metric-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;margin-bottom:8px;font-family:'DM Mono',monospace}
  .metric-val{font-size:26px;font-weight:600;line-height:1;margin-bottom:3px}
  .metric-sub{font-size:11px;color:var(--muted)}
  .grid-2{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px}
  @media(max-width:680px){.grid-2{grid-template-columns:1fr}}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:18px 20px;margin-bottom:14px}
  .card-title{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.09em;color:var(--muted);margin-bottom:14px;font-family:'DM Mono',monospace}
  .dim-row{display:flex;align-items:center;gap:10px;margin-bottom:10px}
  .dim-row:last-child{margin-bottom:0}
  .dim-name{font-size:13px;width:135px;flex-shrink:0}
  .dim-bar-wrap{flex:1;height:6px;background:var(--bg);border-radius:3px;overflow:hidden}
  .dim-bar{height:100%;border-radius:3px;transition:width .5s ease}
  .dim-score{font-size:12px;font-weight:500;width:30px;text-align:right;font-family:'DM Mono',monospace}
  .dim-badge{font-size:10px;font-weight:600;padding:2px 8px;border-radius:20px;width:68px;text-align:center;flex-shrink:0}
  .badge-bom{background:var(--green-bg);color:var(--green)}
  .badge-atencao{background:var(--amber-bg);color:var(--amber)}
  .badge-critico{background:var(--red-bg);color:var(--red)}
  .badge-nd{background:var(--border);color:var(--muted)}
  .alert-item{border-radius:8px;padding:10px 14px;margin-bottom:8px;font-size:13px;display:flex;align-items:center;gap:10px}
  .alert-item:last-child{margin-bottom:0}
  .alert-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
  .alert-critico{background:var(--red-bg);color:var(--red)}
  .alert-critico .alert-dot{background:var(--red)}
  .alert-atencao{background:var(--amber-bg);color:var(--amber)}
  .alert-atencao .alert-dot{background:var(--amber)}
  .alert-ok{background:var(--green-bg);color:var(--green)}
  .alert-ok .alert-dot{background:var(--green)}
  .comp-row{display:flex;align-items:center;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--border)}
  .comp-row:last-child{border-bottom:none}
  .comp-label{font-size:13px;color:var(--muted)}
  .comp-vals{display:flex;gap:20px;align-items:center}
  .comp-val{font-size:19px;font-weight:600;font-family:'DM Mono',monospace}
  .comp-val.seg{color:#1e40af}
  .comp-val.sex{color:#9a3412}
  .comp-delta{font-size:11px;font-weight:600;padding:2px 8px;border-radius:20px}
  .delta-pos{background:var(--green-bg);color:var(--green)}
  .delta-neg{background:var(--red-bg);color:var(--red)}
  .delta-neu{background:var(--border);color:var(--muted)}
  .comment-item{border-left:3px solid var(--border);padding:8px 12px;margin-bottom:8px;font-size:13px;line-height:1.55}
  .comment-item:last-child{margin-bottom:0}
  .comment-tag{font-size:10px;font-weight:600;font-family:'DM Mono',monospace;color:var(--muted);margin-bottom:3px}
  .comment-item.seg-c{border-color:#93C5FD}
  .comment-item.sex-c{border-color:#FCA5A5}
  .tend-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border);font-size:13px}
  .tend-row:last-child{border-bottom:none}
  .tend-up{color:var(--green);font-weight:500}
  .tend-down{color:var(--red);font-weight:500}
  .tend-neu{color:var(--muted)}
  .empty-state{text-align:center;padding:24px;color:var(--muted);font-size:13px}
  .legenda-toggle{display:flex;align-items:center;justify-content:space-between;cursor:pointer;user-select:none}
  .legenda-icon{font-size:11px;color:var(--muted);transition:transform .2s}
  .legenda-icon.open{transform:rotate(180deg)}
  .legenda-box{display:none;margin-top:14px}
  .legenda-box.open{display:block}
  .sem-list{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap}
  .sem-item{display:flex;align-items:flex-start;gap:10px;background:var(--bg);border-radius:8px;padding:10px 14px;flex:1;min-width:180px}
  .sem-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;margin-top:3px}
  .sem-dot.v{background:var(--green)}
  .sem-dot.a{background:#D97706}
  .sem-dot.r{background:#DC2626}
  .sem-text strong{font-size:13px;display:block;margin-bottom:2px}
  .sem-text span{font-size:12px;color:var(--muted)}
  .leg-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  @media(max-width:680px){.leg-grid{grid-template-columns:1fr}}
  .leg-sec{background:var(--bg);border-radius:10px;padding:14px 16px}
  .leg-sec-title{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;margin-bottom:10px;font-family:'DM Mono',monospace}
  .leg-sec-title.seg{color:#1e40af}
  .leg-sec-title.sex{color:#9a3412}
  .leg-dim{margin-bottom:10px}
  .leg-dim:last-child{margin-bottom:0}
  .leg-dim strong{font-size:13px;display:block;margin-bottom:2px}
  .leg-dim p{font-size:12px;color:var(--muted);line-height:1.5}
  .leg-tend{background:var(--bg);border-radius:10px;padding:14px 16px;margin-top:12px;font-size:13px;color:var(--muted);line-height:1.7}
  .leg-sub{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;font-family:'DM Mono',monospace;margin-bottom:10px}
</style>
</head>
<body>

<div class="topbar">
  <div>
    <div class="topbar-brand">Boteco Caju Limao</div>
    <div class="topbar-title">Dashboard — Pesquisa Pulso</div>
  </div>
  <div class="topbar-right">
    <div class="update-time" id="update-time">—</div>
    <button class="btn-refresh" onclick="aplicarFiltro()" id="btn-refresh">Atualizar</button>
  </div>
</div>

<div class="filtro-bar">
  <div class="filtro-label">Periodo</div>
  <button class="pbtn active" id="pbtn-semana" onclick="setPeriodo('semana')">Ultima semana</button>
  <button class="pbtn" id="pbtn-mes" onclick="setPeriodo('mes')">Ultimo mes</button>
  <button class="pbtn" id="pbtn-tudo" onclick="setPeriodo('tudo')">Tudo</button>
  <button class="pbtn" id="pbtn-custom" onclick="setPeriodo('custom')">Personalizado</button>
  <div class="filtro-custom" id="filtro-custom" style="display:none">
    <input type="date" id="dt-ini" onchange="aplicarFiltro()">
    <span style="font-size:12px;color:var(--muted)">ate</span>
    <input type="date" id="dt-fim" onchange="aplicarFiltro()">
  </div>
  <div class="filtro-info" id="filtro-info"></div>
</div>

<div class="container">
  <div class="loading" id="loading">
    <div class="loading-spinner"></div>
    <div>Buscando dados da planilha...</div>
  </div>
  <div id="dashboard" style="display:none"></div>
</div>

<script>
const SHEET_ID='1RJxUPC_bPwy6HogjoEzBi6YntZBChClz9hirctY6U_M';
const GID_SEG=837536532, GID_SEX=1206353071;
let rawSeg=[], rawSex=[], periodoAtivo='semana';

async function fetchSheet(gid){
  const url=`https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&gid=${gid}`;
  const res=await fetch(url);
  if(!res.ok) throw new Error('Erro ao buscar planilha');
  const text=await res.text();
  const json=JSON.parse(text.match(/google\.visualization\.Query\.setResponse\(([\s\S]*)\)/)[1]);
  const cols=json.table.cols.map(c=>c.label);
  return (json.table.rows||[]).map(row=>{
    const obj={};
    cols.forEach((col,i)=>{const cell=row.c[i];obj[col]=cell&&cell.v!==null?String(cell.v):'';});
    return obj;
  });
}

function parseData(s){
  if(!s)return null;
  const p=s.split('/');
  if(p.length===3)return new Date(p[2],p[1]-1,p[0]);
  return new Date(s);
}

function filtrar(dados,ini,fim){
  return dados.filter(r=>{
    const d=parseData(r['Data']);
    if(!d)return false;
    if(ini&&d<ini)return false;
    if(fim&&d>fim)return false;
    return true;
  });
}

function getDatas(){
  const hoje=new Date();hoje.setHours(23,59,59,999);
  if(periodoAtivo==='semana'){const i=new Date(hoje);i.setDate(i.getDate()-7);i.setHours(0,0,0,0);return{ini:i,fim:hoje};}
  if(periodoAtivo==='mes'){const i=new Date(hoje);i.setDate(i.getDate()-30);i.setHours(0,0,0,0);return{ini:i,fim:hoje};}
  if(periodoAtivo==='custom'){
    const iv=document.getElementById('dt-ini').value;
    const fv=document.getElementById('dt-fim').value;
    return{ini:iv?new Date(iv+'T00:00:00'):null,fim:fv?new Date(fv+'T23:59:59'):hoje};
  }
  return{ini:null,fim:hoje};
}

function setPeriodo(p){
  periodoAtivo=p;
  document.querySelectorAll('.pbtn').forEach(b=>b.classList.remove('active'));
  document.getElementById('pbtn-'+p).classList.add('active');
  document.getElementById('filtro-custom').style.display=p==='custom'?'flex':'none';
  if(rawSeg.length||rawSex.length)aplicarFiltro();
}

async function carregar(){
  document.getElementById('loading').style.display='block';
  document.getElementById('dashboard').style.display='none';
  document.getElementById('btn-refresh').disabled=true;
  try{
    rawSeg=await fetchSheet(GID_SEG);
    rawSex=await fetchSheet(GID_SEX);
    aplicarFiltro();
  }catch(e){
    document.getElementById('loading').innerHTML=`<div class="error-box">Erro ao carregar dados: ${e.message}<br><br>Verifique se a planilha esta compartilhada como "Qualquer pessoa com o link pode ver".</div>`;
  }
  document.getElementById('btn-refresh').disabled=false;
  document.getElementById('update-time').textContent='Atualizado '+new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
}

function aplicarFiltro(){
  const{ini,fim}=getDatas();
  const seg=filtrar(rawSeg,ini,fim);
  const sex=filtrar(rawSex,ini,fim);
  let info='';
  if(ini)info=ini.toLocaleDateString('pt-BR')+' → '+(fim?fim.toLocaleDateString('pt-BR'):'hoje');
  document.getElementById('filtro-info').textContent=info?`${info} · ${seg.length+sex.length} respostas`:`${seg.length+sex.length} respostas`;
  renderDashboard(seg,sex);
}

const n=v=>{const x=parseFloat(v);return isNaN(x)?null:x;};
const med=arr=>{const v=arr.filter(x=>x!==null);return v.length?v.reduce((a,b)=>a+b,0)/v.length:null;};

function sem(m){
  if(m===null)return{label:'S/D',cls:'badge-nd',bar:'#ccc'};
  if(m>=4.0)return{label:'BOM',cls:'badge-bom',bar:'#2D6A4F'};
  if(m>=2.8)return{label:'ATENCAO',cls:'badge-atencao',bar:'#D97706'};
  return{label:'CRITICO',cls:'badge-critico',bar:'#DC2626'};
}

function delta(a,b){
  if(a===null||b===null)return'';
  const d=b-a;
  const cls=d>0.2?'delta-pos':d<-0.2?'delta-neg':'delta-neu';
  return`<span class="comp-delta ${cls}">${d>0?'+':''}${d.toFixed(1)}</span>`;
}

function tend(vals){
  if(vals.length<4)return null;
  const mid=Math.floor(vals.length/2);
  const r=med(vals.slice(mid)),a=med(vals.slice(0,mid));
  if(a===null)return null;
  return r-a;
}

function renderDashboard(seg,sex){
  const ch=seg.map(r=>n(r['Chegada (1-5)'])).filter(v=>v!==null);
  const di=seg.map(r=>n(r['Disposicao (1-5)'])).filter(v=>v!==null);
  const en=seg.map(r=>n(r['Engajamento (1-5)'])).filter(v=>v!==null);
  const co=sex.map(r=>n(r['Comida (1-5)'])).filter(v=>v!==null);
  const li=sex.map(r=>n(r['Lideranca (1-5)'])).filter(v=>v!==null);
  const em=sex.map(r=>n(r['Empresa (1-5)'])).filter(v=>v!==null);

  const total=seg.length+sex.length;
  const comC=[...seg,...sex].filter(r=>r['Comentario']&&r['Comentario'].trim()).length;
  const mSeg=med([med(ch),med(di),med(en)]);
  const mSex=med([med(co),med(li),med(em)]);
  const mGeral=med([mSeg,mSex]);

  const dims=[
    {nome:'Chegada',tipo:'seg',vals:ch},
    {nome:'Disposicao',tipo:'seg',vals:di},
    {nome:'Engajamento',tipo:'seg',vals:en},
    {nome:'Comida',tipo:'sex',vals:co},
    {nome:'Lideranca',tipo:'sex',vals:li},
    {nome:'Empresa',tipo:'sex',vals:em},
  ];

  const alertas=dims.map(d=>({...d,m:med(d.vals),s:sem(med(d.vals))})).filter(d=>d.m!==null&&d.m<3.2);
  const cSeg=seg.filter(r=>r['Comentario']&&r['Comentario'].trim()).slice(-8).map(r=>({t:'seg',txt:r['Comentario']}));
  const cSex=sex.filter(r=>r['Comentario']&&r['Comentario'].trim()).slice(-8).map(r=>({t:'sex',txt:r['Comentario']}));
  const comments=[...cSeg,...cSex];

  const cg=mGeral!==null?(mGeral>=4?'var(--green)':mGeral>=2.8?'var(--amber)':'var(--red)'):'var(--muted)';

  document.getElementById('loading').style.display='none';
  const dash=document.getElementById('dashboard');
  dash.style.display='block';

  dash.innerHTML=`
  <div class="metrics-grid">
    <div class="metric-card"><div class="metric-label">Total respostas</div><div class="metric-val">${total}</div><div class="metric-sub">${seg.length} seg · ${sex.length} sex</div></div>
    <div class="metric-card"><div class="metric-label">Media geral</div><div class="metric-val" style="color:${cg}">${mGeral!==null?mGeral.toFixed(1):'—'}</div><div class="metric-sub">escala de 1 a 5</div></div>
    <div class="metric-card"><div class="metric-label">Entrada (seg)</div><div class="metric-val" style="color:#1e40af">${mSeg!==null?mSeg.toFixed(1):'—'}</div><div class="metric-sub">chegada · disposicao · engaj.</div></div>
    <div class="metric-card"><div class="metric-label">Fechamento (sex)</div><div class="metric-val" style="color:#9a3412">${mSex!==null?mSex.toFixed(1):'—'}</div><div class="metric-sub">comida · lideranca · empresa</div></div>
    <div class="metric-card"><div class="metric-label">Com comentario</div><div class="metric-val">${comC}</div><div class="metric-sub">${total>0?Math.round(comC/total*100):0}% das respostas</div></div>
    <div class="metric-card"><div class="metric-label">Alertas ativos</div><div class="metric-val" style="color:${alertas.length>0?'var(--red)':'var(--green)'}">${alertas.length}</div><div class="metric-sub">${alertas.length===0?'tudo dentro do esperado':'requer atencao'}</div></div>
  </div>

  <div class="grid-2">
    <div class="card">
      <div class="card-title">Alertas ativos</div>
      ${alertas.length===0
        ?`<div class="alert-item alert-ok"><div class="alert-dot"></div>Todas as dimensoes dentro do esperado.</div>`
        :alertas.map(a=>`<div class="alert-item ${a.m<2.8?'alert-critico':'alert-atencao'}"><div class="alert-dot"></div><div><strong>${a.nome}</strong> — media ${a.m.toFixed(1)}/5 · ${a.s.label}</div></div>`).join('')}
    </div>
    <div class="card">
      <div class="card-title">Segunda vs Sexta</div>
      <div class="comp-row"><div class="comp-label">Media geral</div><div class="comp-vals"><div class="comp-val seg">${mSeg!==null?mSeg.toFixed(1):'—'}</div><div class="comp-val sex">${mSex!==null?mSex.toFixed(1):'—'}</div>${delta(mSeg,mSex)}</div></div>
      ${[{l:'Chegada → Comida',a:med(ch),b:med(co)},{l:'Disposicao → Lideranca',a:med(di),b:med(li)},{l:'Engajamento → Empresa',a:med(en),b:med(em)}].map(r=>`
      <div class="comp-row"><div class="comp-label">${r.l}</div><div class="comp-vals"><div class="comp-val seg" style="font-size:15px">${r.a!==null?r.a.toFixed(1):'—'}</div><div class="comp-val sex" style="font-size:15px">${r.b!==null?r.b.toFixed(1):'—'}</div>${delta(r.a,r.b)}</div></div>`).join('')}
      <div style="margin-top:10px;font-size:11px;color:var(--muted)"><span style="color:#1e40af;font-weight:600">Azul</span> = segunda &nbsp;·&nbsp; <span style="color:#9a3412;font-weight:600">Laranja</span> = sexta &nbsp;·&nbsp; Delta positivo indica melhora ao longo da semana.</div>
    </div>
  </div>

  <div class="card">
    <div class="card-title">Status por dimensao — periodo selecionado</div>
    ${dims.map(d=>{const m=med(d.vals);const s=sem(m);const pct=m!==null?Math.round((m/5)*100):0;const t=tend(d.vals);const tt=t===null?'':t>0.3?' ↑':t<-0.3?' ↓':' →';const tc=t===null?'':t>0.3?'tend-up':t<-0.3?'tend-down':'tend-neu';
    return`<div class="dim-row"><div class="dim-name">${d.nome} <span style="font-size:10px;color:var(--muted)">(${d.tipo})</span></div><div class="dim-bar-wrap"><div class="dim-bar" style="width:${pct}%;background:${s.bar}"></div></div><div class="dim-score">${m!==null?m.toFixed(1):'—'}</div><div class="dim-badge ${s.cls}">${s.label}</div><div class="${tc}" style="font-size:12px;width:20px;text-align:center">${tt}</div></div>`;}).join('')}
  </div>

  <div class="grid-2">
    <div class="card">
      <div class="card-title">Tendencia do periodo</div>
      ${dims.map(d=>{const t=tend(d.vals);if(t===null)return`<div class="tend-row"><span>${d.nome}</span><span class="tend-neu">Respostas insuficientes</span></div>`;const cls=t>0.3?'tend-up':t<-0.3?'tend-down':'tend-neu';const txt=t>0.3?'↑ Melhorando':t<-0.3?'↓ Piorando':'→ Estavel';return`<div class="tend-row"><span>${d.nome}</span><span class="${cls}">${txt} (${t>0?'+':''}${t.toFixed(1)})</span></div>`;}).join('')}
    </div>
    <div class="card">
      <div class="card-title">Comentarios do time</div>
      ${comments.length===0?`<div class="empty-state">Nenhum comentario no periodo selecionado.</div>`:comments.slice(-10).reverse().map(c=>`<div class="comment-item ${c.t}-c"><div class="comment-tag">${c.t==='seg'?'SEGUNDA':'SEXTA'}</div>${c.txt}</div>`).join('')}
    </div>
  </div>

  <div class="card">
    <div class="legenda-toggle" onclick="toggleLeg()">
      <div class="card-title" style="margin-bottom:0">Guia de interpretacao — clique para expandir</div>
      <div class="legenda-icon" id="leg-icon">▼</div>
    </div>
    <div class="legenda-box" id="leg-box">
      <div style="height:14px"></div>
      <div class="leg-sub">Como ler as medias</div>
      <div class="sem-list">
        <div class="sem-item"><div class="sem-dot v"></div><div class="sem-text"><strong>4,0 ou acima — Situacao saudavel</strong><span>Manter o que esta funcionando. Reconheca e reforce.</span></div></div>
        <div class="sem-item"><div class="sem-dot a"></div><div class="sem-text"><strong>2,8 a 3,9 — Ponto de atencao</strong><span>Investigue antes de virar problema. Converse com o time.</span></div></div>
        <div class="sem-item"><div class="sem-dot r"></div><div class="sem-text"><strong>Abaixo de 2,8 — Alerta critico</strong><span>Exige acao imediata da lideranca. Nao ignore.</span></div></div>
      </div>
      <div class="leg-sub">O que cada dimensao mede</div>
      <div class="leg-grid">
        <div class="leg-sec">
          <div class="leg-sec-title seg">Segunda-feira — Como o time chega</div>
          <div class="leg-dim"><strong>Chegada</strong><p>Estado do funcionario antes de comecar o turno. Indica se chega descansado ou ja desgastado. Sinaliza problemas externos que afetam o desempenho antes do servico comecar.</p></div>
          <div class="leg-dim"><strong>Disposicao</strong><p>Energia fisica e mental disponivel para o trabalho. Baixa disposicao na segunda e alerta precoce de sobrecarga, problemas de saude ou insatisfacao acumulada.</p></div>
          <div class="leg-dim"><strong>Engajamento</strong><p>Vontade de contribuir e dar o melhor no dia. Indicador mais direto de motivacao individual — impacta diretamente a qualidade do atendimento e da execucao.</p></div>
        </div>
        <div class="leg-sec">
          <div class="leg-sec-title sex">Sexta-feira — Como a semana foi percebida</div>
          <div class="leg-dim"><strong>Comida</strong><p>Satisfacao com a refeicao do staff durante a semana. Termometro direto de cuidado com a equipe. Time mal alimentado produz menos e percebe descaso da lideranca.</p></div>
          <div class="leg-dim"><strong>Lideranca</strong><p>Percepcao de suporte, comunicacao e reconhecimento na semana. Indicador com maior correlacao com rotatividade — pessoas saem de lideres, nao de empresas.</p></div>
          <div class="leg-dim"><strong>Empresa</strong><p>Senso de pertencimento, orgulho e perspectiva de futuro no Caju Limao. Principal preditor de retencao a medio prazo.</p></div>
        </div>
      </div>
      <div class="leg-tend">
        <div class="leg-sub" style="margin-bottom:8px">Lendo a tendencia</div>
        <span style="color:var(--green);font-weight:600">↑ Melhorando</span> — respostas recentes acima das anteriores no periodo. &nbsp;
        <span style="color:var(--red);font-weight:600">↓ Piorando</span> — queda nas respostas recentes, requer atencao. &nbsp;
        <span style="font-weight:600">→ Estavel</span> — variacao dentro da margem normal.
      </div>
    </div>
  </div>`;
}

function toggleLeg(){
  document.getElementById('leg-box').classList.toggle('open');
  document.getElementById('leg-icon').classList.toggle('open');
}

carregar();
</script>
</body>
</html>
